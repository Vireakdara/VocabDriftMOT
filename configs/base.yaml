model:
  path: "yolov8s-world.pt"
  conf_threshold: 0.25

video:
  path: "/home/wrf/Dara/datasets/MOT17/train/MOT17-09-FRCNN"

vocabulary:
  initial: ["person", "car", "bicycle", "motorcycle", "bus", "truck"]

transitions:
  - frame: 30
    vocab: ["pedestrian", "car", "bicycle"]
    transition_type: "synonym"
  - frame: 60
    vocab: ["vehicle", "person"]
    transition_type: "hypernym_expand"
  - frame: 90
    vocab: ["airplane", "dog", "cat"]
    transition_type: "disjoint"

logging:
  output_dir: "outputs"
  log_file: "outputs/run_log.jsonl"

dataset:
  root: "/home/wrf/Dara/datasets/MOT17/train"